<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siftly</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 400px;
      min-height: 80px;
      max-height: 600px;
      background: #09090b;
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #27272a;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background: #6366f1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #f4f4f5;
    }

    #settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #71717a;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    #settings-btn:hover {
      color: #f4f4f5;
      background: #27272a;
    }

    /* ── Status Bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: #18181b;
      border-bottom: 1px solid #27272a;
      font-size: 11px;
      color: #71717a;
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #71717a;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
    }

    .status-dot.error {
      background: #ef4444;
    }

    /* ── Search Section ── */
    #search-section {
      padding: 12px 16px;
      border-bottom: 1px solid #27272a;
      flex-shrink: 0;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      color: #71717a;
      pointer-events: none;
      flex-shrink: 0;
    }

    #search-input {
      width: 100%;
      padding: 8px 36px 8px 34px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #f4f4f5;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    #search-input::placeholder {
      color: #52525b;
    }

    #search-input:focus {
      border-color: #6366f1;
    }

    #search-clear {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: #71717a;
      padding: 2px;
      border-radius: 4px;
      display: none;
      align-items: center;
    }

    #search-clear:hover {
      color: #f4f4f5;
    }

    #search-clear.visible {
      display: flex;
    }

    /* ── Results ── */
    #results {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }

    #results::-webkit-scrollbar {
      width: 4px;
    }

    #results::-webkit-scrollbar-track {
      background: transparent;
    }

    #results::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 2px;
    }

    .bookmark-card {
      padding: 10px 16px;
      border-bottom: 1px solid #18181b;
      cursor: default;
      transition: background 0.1s;
    }

    .bookmark-card:last-child {
      border-bottom: none;
    }

    .bookmark-card:hover {
      background: #18181b;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .author-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #27272a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #71717a;
      flex-shrink: 0;
      overflow: hidden;
    }

    .author-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .author-handle {
      font-size: 12px;
      font-weight: 600;
      color: #a1a1aa;
    }

    .card-date {
      font-size: 11px;
      color: #52525b;
      margin-left: auto;
    }

    .card-text {
      font-size: 13px;
      color: #d4d4d8;
      line-height: 1.45;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .category-chip {
      padding: 2px 7px;
      background: #1e1e2e;
      border: 1px solid #3f3f5a;
      border-radius: 999px;
      font-size: 10px;
      color: #818cf8;
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .btn {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn:active {
      opacity: 0.7;
    }

    .btn-view {
      background: #27272a;
      color: #d4d4d8;
    }

    .btn-queue {
      background: #6366f1;
      color: #fff;
    }

    .btn-queue.added {
      background: #22c55e;
    }

    .btn-queue.adding {
      opacity: 0.6;
      cursor: default;
      pointer-events: none;
    }

    /* ── Empty State ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px 16px;
      color: #52525b;
      text-align: center;
    }

    #empty-state[hidden] {
      display: none;
    }

    .empty-icon {
      font-size: 28px;
      line-height: 1;
    }

    .empty-title {
      font-size: 13px;
      font-weight: 600;
      color: #71717a;
    }

    .empty-sub {
      font-size: 12px;
      color: #52525b;
      max-width: 220px;
    }

    /* ── Loading ── */
    #loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px 16px;
    }

    #loading[hidden] {
      display: none;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #27272a;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading-text {
      font-size: 12px;
      color: #71717a;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Settings Panel ── */
    #settings-panel {
      position: absolute;
      inset: 0;
      background: #09090b;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }

    #settings-panel[hidden] {
      display: none;
    }

    .settings-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #27272a;
    }

    .settings-back {
      background: none;
      border: none;
      cursor: pointer;
      color: #71717a;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .settings-back:hover {
      color: #f4f4f5;
    }

    .settings-title {
      font-size: 15px;
      font-weight: 600;
    }

    .settings-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .settings-field label {
      display: block;
      font-size: 12px;
      color: #71717a;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .settings-field input {
      width: 100%;
      padding: 8px 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #f4f4f5;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .settings-field input:focus {
      border-color: #6366f1;
    }

    .settings-save {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .settings-save:hover {
      opacity: 0.85;
    }

    .settings-hint {
      font-size: 11px;
      color: #52525b;
    }
  </style>
</head>
<body>

  <!-- Settings Panel (overlays everything) -->
  <div id="settings-panel" hidden>
    <div class="settings-header">
      <button class="settings-back" id="settings-back" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <span class="settings-title">Settings</span>
    </div>
    <div class="settings-body">
      <div class="settings-field">
        <label for="siftly-url-input">Siftly URL</label>
        <input type="url" id="siftly-url-input" placeholder="http://localhost:3000" />
        <p class="settings-hint" style="margin-top:4px;">URL of your self-hosted Siftly instance.</p>
      </div>
      <button class="settings-save" id="settings-save">Save</button>
    </div>
  </div>

  <!-- Header -->
  <div id="header">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span class="logo-text">Siftly</span>
    </div>
    <button id="settings-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
      </svg>
    </button>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Checking connection…</span>
  </div>

  <!-- Search Section -->
  <div id="search-section">
    <div class="search-wrapper">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="search-input"
        placeholder="Search your bookmarks…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-clear" title="Clear">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Results List -->
  <div id="results"></div>

  <!-- Empty State -->
  <div id="empty-state" hidden>
    <div class="empty-icon">🔍</div>
    <div class="empty-title">No bookmarks found</div>
    <div class="empty-sub">Try a different search term or browse more of your saved content.</div>
  </div>

  <!-- Loading -->
  <div id="loading" hidden>
    <div class="spinner"></div>
    <div class="loading-text">Searching bookmarks…</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
