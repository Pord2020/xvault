<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="200" height="100" rx="44" fill="url(#shine)"/>

  <!-- X letterform — two crossing thick strokes -->
  <line x1="52" y1="52" x2="148" y2="130" stroke="white" stroke-width="26" stroke-linecap="round"/>
  <line x1="148" y1="52" x2="52" y2="130" stroke="white" stroke-width="26" stroke-linecap="round"/>

  <!-- Vault arc (semicircle bottom — suggests a vault door) -->
  <path d="M62 158 A38 38 0 0 1 138 158" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Vault center dot -->
  <circle cx="100" cy="158" r="7" fill="white" opacity="0.9"/>
  <!-- Vault tick marks -->
  <line x1="62" y1="158" x2="62" y2="170" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="138" y1="158" x2="138" y2="170" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
</svg>
